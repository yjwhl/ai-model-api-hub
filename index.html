<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大模型API广场 - 专业级AI模型价格对比平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #22d3ee;
            --accent: #f472b6;
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --bg-card-hover: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: #1f2937;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #c084fc 100%);
            --gradient-2: linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 15, 26, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 800;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Scenario Tabs */
        .scenario-tabs {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            position: sticky;
            top: 70px;
            z-index: 99;
            overflow-x: auto;
        }

        .scenario-tabs-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
        }

        .scenario-tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .scenario-tab:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .scenario-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Main Content */
        .main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }

        .filter-select {
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 140px;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .sort-btn {
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .sort-btn:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .sort-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Model Grid */
        .model-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 1.5rem;
        }

        /* Model Card */
        .model-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .model-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .model-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-light);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .model-card:hover::before {
            opacity: 1;
        }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .model-info {
            flex: 1;
        }

        .model-provider {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .provider-logo {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
        }

        .provider-name {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .model-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.new {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge.hot {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .badge.free {
            background: rgba(34, 211, 238, 0.2);
            color: var(--secondary);
        }

        .badge.china {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge.opensource {
            background: rgba(244, 114, 182, 0.2);
            color: var(--accent);
        }

        /* Price Section - 全新设计 */
        .price-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(34, 211, 238, 0.05) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .price-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .price-value {
            font-size: 1.75rem;
            font-weight: 800;
        }

        .price-value.free {
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .price-value.paid {
            color: var(--text-primary);
        }

        .price-unit {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Energy Bar - 价格能量条 */
        .energy-bar-container {
            margin-top: 0.5rem;
        }

        .energy-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .energy-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .energy-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .energy-bar-fill.low {
            background: linear-gradient(90deg, #10b981, #34d399);
        }

        .energy-bar-fill.mid {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }

        .energy-bar-fill.high {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }

        /* Scene Cost - 场景化成本 */
        .scene-cost {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .scene-cost-item {
            text-align: center;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }

        .scene-cost-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--secondary);
        }

        .scene-cost-label {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        /* Context Window */
        .context-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }

        .context-value {
            color: var(--secondary);
            font-weight: 600;
        }

        /* Capabilities - 能力星级 */
        .capabilities {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .capability-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .capability-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .capability-stars {
            display: flex;
            gap: 2px;
        }

        .star {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: var(--border);
        }

        .star.filled {
            background: var(--warning);
        }

        .star.half {
            background: linear-gradient(90deg, var(--warning) 50%, var(--border) 50%);
        }

        /* Access Info - 访问信息 */
        .access-info {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .access-tag {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.65rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .access-tag.direct {
            color: var(--success);
        }

        .access-tag.proxy {
            color: var(--warning);
        }

        .access-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .access-tag.direct .dot {
            background: var(--success);
        }

        .access-tag.proxy .dot {
            background: var(--warning);
        }

        .feature-tag {
            padding: 0.35rem 0.65rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Card Actions */
        .card-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            border: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        /* Cost Calculator Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .modal-close:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .calc-section {
            margin-bottom: 1.5rem;
        }

        .calc-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .calc-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .calc-presets {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .calc-preset {
            padding: 0.4rem 0.75rem;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calc-preset:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .calc-preset.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .calc-results {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 1rem;
        }

        .calc-result-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .calc-result-item:last-child {
            border-bottom: none;
        }

        .calc-result-name {
            color: var(--text-secondary);
        }

        .calc-result-value {
            font-weight: 600;
        }

        .calc-result-value.best {
            color: var(--success);
        }

        /* Compare Section */
        .compare-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: none;
        }

        .compare-section.visible {
            display: block;
        }

        .compare-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .compare-title {
            font-size: 1rem;
            font-weight: 600;
        }

        .compare-close {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .compare-close:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .compare-models {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .compare-model {
            background: var(--bg-dark);
            border-radius: 10px;
            padding: 1rem;
        }

        .compare-model-name {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .compare-model-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        .footer-text {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .token-note {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-radius: 20px;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .token-note span {
            color: var(--secondary);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .stats-bar {
                justify-content: center;
            }

            .model-grid {
                grid-template-columns: 1fr;
            }

            .filter-bar {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .scene-cost {
                grid-template-columns: repeat(2, 1fr);
            }

            .capabilities {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .model-card {
            animation: fadeIn 0.4s ease forwards;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Compare Button */
        .calc-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gradient-1);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
            z-index: 200;
        }

        .calc-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🤖</div>
                <div>
                    <div class="logo-text">大模型API广场</div>
                    <div class="logo-sub">专业级AI模型价格对比平台</div>
                </div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="totalModels">35+</div>
                    <div class="stat-label">模型数量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">15+</div>
                    <div class="stat-label">服务商</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">¥1</div>
                    <div class="stat-label">起可对话</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Scenario Tabs -->
    <nav class="scenario-tabs">
        <div class="scenario-tabs-inner">
            <button class="scenario-tab active" data-scenario="all">全部场景</button>
            <button class="scenario-tab" data-scenario="coding">💻 代码生成</button>
            <button class="scenario-tab" data-scenario="reasoning">🧠 推理分析</button>
            <button class="scenario-tab" data-scenario="multimodal">🎨 多模态</button>
            <button class="scenario-tab" data-scenario="longcontext">📄 长文本</button>
            <button class="scenario-tab" data-scenario="value">💰 性价比</button>
            <button class="scenario-tab" data-scenario="free">🆓 免费</button>
            <button class="scenario-tab" data-scenario="china">🇨🇳 国内可用</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索模型、厂商、功能...">
            </div>
            <select class="filter-select" id="providerFilter">
                <option value="">全部厂商</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="google">Google</option>
                <option value="deepseek">DeepSeek</option>
                <option value="meta">Meta</option>
                <option value="mistral">Mistral</option>
                <option value="xai">xAI</option>
                <option value="zhipuai">智谱AI</option>
                <option value="moonshot">月之暗面</option>
                <option value="aliyun">阿里云</option>
                <option value="baidu">百度</option>
                <option value="tencent">腾讯</option>
                <option value="bytedance">字节跳动</option>
                <option value="iflytek">讯飞</option>
                <option value="intern">上海AI Lab</option>
                <option value="siliconflow">硅基流动</option>
            </select>
            <select class="filter-select" id="tierFilter">
                <option value="">全部等级</option>
                <option value="1">🏆 顶级旗舰</option>
                <option value="2">⚡ 性价比首选</option>
                <option value="3">💰 经济实惠</option>
            </select>
            <button class="sort-btn" id="sortBtn" data-sort="price-asc">
                💰 价格排序
            </button>
        </div>

        <!-- Model Grid -->
        <div class="model-grid" id="modelGrid">
            <!-- Cards will be inserted here by JavaScript -->
        </div>
    </main>

    <!-- Cost Calculator Button -->
    <button class="calc-btn" onclick="openCalculator()" title="成本计算器">🧮</button>

    <!-- Cost Calculator Modal -->
    <div class="modal-overlay" id="calculatorModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">🧮 成本计算器</h2>
                <button class="modal-close" onclick="closeCalculator()">×</button>
            </div>
            
            <div class="calc-section">
                <div class="calc-label">选择常用场景</div>
                <div class="calc-presets">
                    <button class="calc-preset active" data-preset="chat">💬 日常对话</button>
                    <button class="calc-preset" data-preset="article">📝 短篇文章</button>
                    <button class="calc-preset" data-preset="code">💻 代码生成</button>
                    <button class="calc-preset" data-preset="longdoc">📄 长文档</button>
                </div>
            </div>

            <div class="calc-section">
                <div class="calc-label">预估调用量（次/月）</div>
                <input type="number" class="calc-input" id="callCount" value="1000" min="1">
            </div>

            <div class="calc-section">
                <div class="calc-label">每次输入字数</div>
                <input type="number" class="calc-input" id="inputChars" value="500" min="1">
            </div>

            <div class="calc-section">
                <div class="calc-label">每次输出字数</div>
                <input type="number" class="calc-input" id="outputChars" value="800" min="1">
            </div>

            <button class="btn btn-primary" onclick="calculateCost()" style="width: 100%; margin-bottom: 1rem;">
                计算成本
            </button>

            <div class="calc-results" id="calcResults">
                <div class="calc-result-item">
                    <span class="calc-result-name">选择场景和参数后点击计算</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-text">
            <p>数据更新时间：2026年4月 | 价格单位：美元/千Token</p>
            <p>数据来源：各厂商官方文档 | <a href="https://github.com/yjwhl/ai-model-api-hub" target="_blank" style="color: var(--primary);">GitHub</a></p>
        </div>
        <div class="token-note">
            📌 换算标准：<span>1000 Token ≈ 750 汉字</span>
        </div>
    </footer>

    <script src="js/models.js"></script>
    <script>
        // Data
        const models = MODELS_DATA.models;

        // State
        let currentScenario = 'all';
        let currentSort = 'price-asc';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderModels(models);
            setupEventListeners();
        });

        // Event Listeners
        function setupEventListeners() {
            // Scenario tabs
            document.querySelectorAll('.scenario-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.scenario-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentScenario = tab.dataset.scenario;
                    filterAndSort();
                });
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', filterAndSort);

            // Filters
            document.getElementById('providerFilter').addEventListener('change', filterAndSort);
            document.getElementById('tierFilter').addEventListener('change', filterAndSort);

            // Sort
            document.getElementById('sortBtn').addEventListener('click', () => {
                const sorts = ['price-asc', 'price-desc', 'tier-asc', 'name-asc'];
                const currentIndex = sorts.indexOf(currentSort);
                currentSort = sorts[(currentIndex + 1) % sorts.length];
                
                const btn = document.getElementById('sortBtn');
                const icons = ['💰↑', '💰↓', '🏆', '🔤'];
                const labels = ['价格↑', '价格↓', '等级', '名称'];
                const index = sorts.indexOf(currentSort);
                btn.innerHTML = `${icons[index]} ${labels[index]}`;
                btn.classList.add('active');
                
                filterAndSort();
            });

            // Calculator presets
            document.querySelectorAll('.calc-preset').forEach(preset => {
                preset.addEventListener('click', () => {
                    document.querySelectorAll('.calc-preset').forEach(p => p.classList.remove('active'));
                    preset.classList.add('active');
                    
                    const presetData = {
                        chat: { input: 200, output: 300 },
                        article: { input: 500, output: 1000 },
                        code: { input: 300, output: 800 },
                        longdoc: { input: 2000, output: 2000 }
                    };
                    
                    const data = presetData[preset.dataset.preset];
                    document.getElementById('inputChars').value = data.input;
                    document.getElementById('outputChars').value = data.output;
                });
            });
        }

        // Filter and Sort
        function filterAndSort() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const providerFilter = document.getElementById('providerFilter').value;
            const tierFilter = document.getElementById('tierFilter').value;

            let filtered = models.filter(model => {
                // Scenario filter
                if (currentScenario !== 'all' && !model.category.includes(currentScenario)) {
                    return false;
                }

                // Provider filter
                if (providerFilter && model.providerKey !== providerFilter) {
                    return false;
                }

                // Tier filter
                if (tierFilter && model.tier.toString() !== tierFilter) {
                    return false;
                }

                // Search filter
                if (searchTerm) {
                    const searchString = `${model.name} ${model.provider} ${model.features.join(' ')} ${model.scenarios.join(' ')}`.toLowerCase();
                    if (!searchString.includes(searchTerm)) return false;
                }

                return true;
            });

            // Sort
            filtered.sort((a, b) => {
                switch (currentSort) {
                    case 'price-asc':
                        const aPrice = a.inputPrice === 0 ? -1 : a.inputPrice;
                        const bPrice = b.inputPrice === 0 ? -1 : b.inputPrice;
                        return aPrice - bPrice;
                    case 'price-desc':
                        const aPriceD = a.inputPrice === 0 ? 999 : a.inputPrice;
                        const bPriceD = b.inputPrice === 0 ? 999 : b.inputPrice;
                        return bPriceD - aPriceD;
                    case 'tier-asc':
                        return a.tier - b.tier;
                    case 'name-asc':
                        return a.name.localeCompare(b.name);
                    default:
                        return 0;
                }
            });

            renderModels(filtered);
        }

        // Render Models
        function renderModels(modelList) {
            const grid = document.getElementById('modelGrid');
            grid.innerHTML = modelList.map(model => createModelCard(model)).join('');
            
            document.getElementById('totalModels').textContent = modelList.length + '+';
        }

        // Create Model Card
        function createModelCard(model) {
            // Calculate scene costs (in CNY, assuming 1 USD = 7.2 CNY)
            const rate = 7.2;
            const avgPrice = model.inputPrice === 0 ? 0 : (model.inputPrice + model.outputPrice) / 2;
            
            // Cost calculations (100 chars input + 200 chars output = ~400 tokens)
            const tokensPerCall = 400; // Approximate
            const costPerCall = (tokensPerCall / 1000) * avgPrice * rate; // CNY
            const yuanForHundredCalls = costPerCall * 100; // CNY for 100 calls
            
            // Energy bar calculation (based on relative price)
            const maxPrice = 5;
            const priceRatio = avgPrice / maxPrice;
            const energyLevel = priceRatio < 0.3 ? 'low' : priceRatio < 0.6 ? 'mid' : 'high';
            const energyWidth = Math.max(5, (1 - priceRatio) * 100);

            // Badges HTML
            const badgesHtml = model.badges.map(badge => {
                const labels = { new: '🆕 新', hot: '🔥 热门', free: '🆓 免费', china: '🇨🇳 国内', opensource: '🔓 开源' };
                return `<span class="badge ${badge}">${labels[badge] || badge}</span>`;
            }).join('');

            // Access info
            const accessHtml = model.chinaAccessible 
                ? `<span class="access-tag direct"><span class="dot"></span>国内直连</span>`
                : `<span class="access-tag proxy"><span class="dot"></span>需代理</span>`;

            // Features (show first 3)
            const featuresHtml = model.features.slice(0, 3).map(f => 
                `<span class="feature-tag">${f}</span>`
            ).join('');

            // Capabilities stars
            const capabilitiesHtml = ['coding', 'reasoning', 'chinese'].map(cap => {
                const stars = model.capabilities[cap];
                const starsHtml = Array(5).fill(0).map((_, i) => 
                    `<span class="star ${i < stars ? 'filled' : ''}"></span>`
                ).join('');
                const labels = { coding: '代码', reasoning: '推理', chinese: '中文' };
                return `
                    <div class="capability-item">
                        <span class="capability-label">${labels[cap]}</span>
                        <div class="capability-stars">${starsHtml}</div>
                    </div>
                `;
            }).join('');

            // Price display
            const priceDisplay = model.inputPrice === 0 
                ? `<span class="price-value free">免费</span>`
                : `<span class="price-value paid">$${avgPrice.toFixed(2)}</span>`;

            return `
                <div class="model-card">
                    <div class="card-header">
                        <div class="model-info">
                            <div class="model-provider">
                                <div class="provider-logo">${model.providerLogo}</div>
                                <span class="provider-name">${model.provider}</span>
                            </div>
                            <div class="model-name">${model.name}</div>
                            <div class="badges">${badgesHtml}</div>
                        </div>
                    </div>

                    <div class="price-section">
                        <div class="price-main">
                            <div>
                                ${priceDisplay}
                                <div class="price-unit">${model.inputPrice === 0 ? '永久免费' : '美元/千Token'}</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 0.8rem; color: var(--text-muted);">上下文</div>
                                <div class="context-value">${model.contextLabel}</div>
                            </div>
                        </div>
                        
                        ${model.inputPrice !== 0 ? `
                        <div class="energy-bar-container">
                            <div class="energy-bar-label">
                                <span>价格对比</span>
                                <span>相对价格指数</span>
                            </div>
                            <div class="energy-bar">
                                <div class="energy-bar-fill ${energyLevel}" style="width: ${energyWidth}%"></div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="scene-cost">
                            <div class="scene-cost-item">
                                <div class="scene-cost-value">${yuanForHundredCalls < 0.01 ? '≈0' : '¥' + yuanForHundredCalls.toFixed(2)}</div>
                                <div class="scene-cost-label">100次对话</div>
                            </div>
                            <div class="scene-cost-item">
                                <div class="scene-cost-value">¥${(costPerCall * 10).toFixed(3)}</div>
                                <div class="scene-cost-label">10次对话</div>
                            </div>
                            <div class="scene-cost-item">
                                <div class="scene-cost-value">¥${(costPerCall * 1000).toFixed(1)}</div>
                                <div class="scene-cost-label">千次对话</div>
                            </div>
                        </div>
                    </div>

                    <div class="access-info">
                        ${accessHtml}
                        <span class="access-tag">📝 ${model.实测数据.响应速度}</span>
                    </div>

                    <div class="capabilities">
                        ${capabilitiesHtml}
                    </div>

                    <div style="margin-bottom: 1rem;">
                        ${featuresHtml}
                    </div>

                    <div class="card-actions">
                        <a href="${model.url}" target="_blank" class="btn btn-primary">访问官网</a>
                        <button class="btn btn-secondary" onclick="copyName('${model.name}')">复制</button>
                    </div>
                </div>
            `;
        }

        // Copy Name
        function copyName(name) {
            navigator.clipboard.writeText(name);
            event.target.textContent = '已复制!';
            setTimeout(() => {
                event.target.textContent = '复制';
            }, 1500);
        }

        // Calculator Functions
        function openCalculator() {
            document.getElementById('calculatorModal').classList.add('visible');
        }

        function closeCalculator() {
            document.getElementById('calculatorModal').classList.remove('visible');
        }

        function calculateCost() {
            const callCount = parseInt(document.getElementById('callCount').value) || 1000;
            const inputChars = parseInt(document.getElementById('inputChars').value) || 500;
            const outputChars = parseInt(document.getElementById('outputChars').value) || 800;
            
            const totalChars = inputChars + outputChars;
            const tokensPerCall = Math.ceil(totalChars / 0.75); // 750 chars = 1000 tokens
            const inputTokens = Math.ceil(inputChars / 0.75);
            const outputTokens = Math.ceil(outputChars / 0.75);
            
            const rate = 7.2;
            
            // Calculate for each model
            const results = models
                .filter(m => m.inputPrice !== 0 || m.outputPrice !== 0)
                .map(model => {
                    const inputCost = (inputTokens / 1000) * model.inputPrice * rate;
                    const outputCost = (outputTokens / 1000) * model.outputPrice * rate;
                    const monthlyCost = (inputCost + outputCost) * callCount;
                    const perYuanCalls = callCount / monthlyCost;
                    
                    return {
                        name: model.name,
                        monthlyCost: monthlyCost,
                        perYuanCalls: perYuanCalls,
                        provider: model.provider
                    };
                })
                .sort((a, b) => a.monthlyCost - b.monthlyCost)
                .slice(0, 8);

            const bestModel = results[0];

            const resultsHtml = results.map((r, i) => `
                <div class="calc-result-item">
                    <span class="calc-result-name">${i === 0 ? '🏆 ' : ''}${r.name}</span>
                    <span class="calc-result-value ${i === 0 ? 'best' : ''}">
                        ¥${r.monthlyCost.toFixed(2)}/月
                        <span style="font-size: 0.75rem; color: var(--text-muted);">
                            (¥1≈${r.perYuanCalls.toFixed(0)}次)
                        </span>
                    </span>
                </div>
            `).join('');

            document.getElementById('calcResults').innerHTML = `
                <div style="margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);">
                    <span style="color: var(--text-muted); font-size: 0.85rem;">每次调用消耗约 ${tokensPerCall} tokens</span>
                </div>
                ${resultsHtml}
            `;
        }

        // Close modal on outside click
        document.getElementById('calculatorModal').addEventListener('click', (e) => {
            if (e.target.id === 'calculatorModal') {
                closeCalculator();
            }
        });
    </script>
</body>
</html>
